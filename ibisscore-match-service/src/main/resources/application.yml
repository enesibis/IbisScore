server:
  port: 8082

spring:
  application:
    name: ibisscore-match-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ibisscore}
    username: ${SPRING_DATASOURCE_USERNAME:ibisscore_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_strong_password}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 25

  flyway:
    enabled: false  # Tablolar init-db.sql ile oluşturulur

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, caches, prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.ibisscore: DEBUG
