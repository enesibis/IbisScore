global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: ibisscore

scrape_configs:

  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway:8080']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8081']

  - job_name: 'match-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['match-service:8082']

  - job_name: 'data-ingestion'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['data-ingestion:8083']

  - job_name: 'betting-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['betting-service:8084']

  - job_name: 'ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8000']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']   # RabbitMQ Prometheus plugin

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
